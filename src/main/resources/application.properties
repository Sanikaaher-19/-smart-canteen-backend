spring.application.name=SmartCanteen
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

frontend.url=${FRONTEND_URL:https://smart-canteen-bite.netlify.app/}
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN


server.port=${PORT:9090}

# JWT Secret (to fix PropertyPlaceholder issue)
jwt.secret=mySmartCanteenSecretKey

# JWT properties used by JwtService
## IMPORTANT: use a secret at least 32 bytes long for HS256
# You can generate a secure key with e.g. `openssl rand -base64 48`
app.jwt.secret=0b3f9d2a8e6c4b7f1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4
# token expiration in milliseconds (e.g. 1 day)
app.jwt.expiration-ms=86400000

# Frontend origin used in @CrossOrigin annotations
# Set to your frontend dev server (e.g. http://localhost:3000) or use '*' for all origins
app.frontend.origin=${FRONTEND_URL:https://smart-canteen-bite.netlify.app/}

# Analytics service configuration
app.analytics.mock=false
app.analytics.url=http://localhost:5000

logging.level.org.springframework.security=DEBUG
